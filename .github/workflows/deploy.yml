name: Deploy — dev environment

on:
  workflow_run:
    workflows:
      - "CI — Build and push image"
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy to ECS dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::061836593621:role/app-app14-github-deploy
          aws-region: eu-north-1

      - name: Update ECS service with new image
        env:
          IMAGE_URI: 061836593621.dkr.ecr.eu-north-1.amazonaws.com/app-app14:${{ github.event.workflow_run.head_sha }}
          CLUSTER: postnord-tpl-cluster
          SERVICE: app-app14-dev
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region eu-north-1

      - name: Wait for deployment to stabilise
        env:
          CLUSTER: postnord-tpl-cluster
          SERVICE: app-app14-dev
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region eu-north-1
