name: Deploy — dev environment

on:
  workflow_run:
    workflows:
      - "CI — Build and push image"
    types:
      - completed
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy to ECS dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: {{GITHUB_DEPLOY_ROLE_ARN}}
          aws-region: {{AWS_REGION}}

      - name: Update ECS service with new image
        env:
          IMAGE_URI: {{ECR_REPO_URI}}:${{ github.event.workflow_run.head_sha }}
          CLUSTER: {{ECS_CLUSTER}}
          SERVICE: {{ECS_SERVICE_DEV}}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --region {{AWS_REGION}}

      - name: Wait for deployment to stabilise
        env:
          CLUSTER: {{ECS_CLUSTER}}
          SERVICE: {{ECS_SERVICE_DEV}}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "$SERVICE" \
            --region {{AWS_REGION}}
